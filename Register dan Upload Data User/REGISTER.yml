info:
  name: REGISTER
  type: http
  seq: 1

http:
  method: POST
  url: https://webapi.myindah-app.com/api/mobileapps/register
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: Angga Angga
      - name: email
        type: text
        value: angga.amgga@upi.edu
      - name: password
        type: text
        value: "12345"
      - name: password_confirmation
        type: text
        value: "12345"
      - name: role_name
        type: text
        value: farmer

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # **POST REGISTER USER**

  Dokumen untuk mengirimkan API register user dengan **Headers,** menggunakan method **POST**

  | **Key** | **Value** |
  | --- | --- |
  | Accept | application/json |
  | Content-Type | application/json |
  | Authorization | Bearer **TOKEN DARI LOGIN** |

  lalu **Body** dengan **form-data** diisi dengan

  | **Key** | **Tipe** | **Value** |
  | --- | --- | --- |
  | name | text | _isikan nama user_ |
  | email | text | _isikan email_ |
  | password | text | _isikan password_ |
  | password_confirmation | text | _isikan ulangin password_ |
  | role_name | text | _isikan dengan peran comsumer atau farmer_ |
  | roles\[\] | text | _isikan dengan peran comsumer atau farmer_ |
  | _method | text | PATCH |
